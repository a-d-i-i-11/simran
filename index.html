<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Access Portal</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f14;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #111827;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,255,150,0.2);
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}
button {
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
.hidden {
    display: none;
}
.loading {
    margin-top: 20px;
    font-size: 14px;
    color: #00ffcc;
}
</style>

</head>

<body>

<div class="container" id="step1">
    <h2>🔒 Secure Verification</h2>
    <p>Restricted system access</p>
    <input type="text" value="(Her Name Here)" id="name">
    <button onclick="step2()">Verify Identity</button>
</div>

<div class="container hidden" id="step2">
    <h2>📲 Cvv Verification</h2>
    <p>Enter Passkey</p>
    <input type="text" placeholder="******">
    <button onclick="step3()">Submit</button>
</div>

<div class="container hidden" id="step3">
    <h2>🔍 Scanning...</h2>
    <div class="loading" id="scanText">Initializing...</div>
</div>

<script>
function step2() {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
}

function step3() {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');

    let text = document.getElementById("scanText");

    let steps = [
        "Connecting to secure database...",
        "Fetching personal data...",
        "Sensitive records detected...",
        "Analyzing relationship data...",
        "⚠️ Critical emotional data found..."
    ];

    let i = 0;

    let interval = setInterval(() => {
        text.innerHTML = steps[i];
        i++;
        if(i === steps.length){
            clearInterval(interval);
            setTimeout(showResult, 1500);
        }
    }, 1200);
}

function showResult() {
    document.body.innerHTML = `
        <div style="text-align:center;">
            <h1 style="color:#ff4d4d;">💣 APRIL FOOOOL simran😂😂</h1>
            <h2>System says: You are guilty...</h2>
            <p>Of stealing my heart ❤️😌</p>
            <h1>I love you simran<h1>
        </div>
    `;
}
</script>

</body>
</html>
